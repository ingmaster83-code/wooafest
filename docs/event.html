<script>
let evData = null;

function getParam(k) {
  return new URLSearchParams(location.search).get(k);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(d) {
  const s = String(d||'').replace(/\D/g,'');
  if(s.length===8) return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
  return d||'';
}
function getDDayLabel(endDate, startDate) {
  const now = new Date(); now.setHours(0,0,0,0);
  const fix = d => new Date(String(d).replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3'));
  const end = fix(endDate), start = fix(startDate);
  if(now >= start && now <= end) return {label:'LIVE', cls:'badge-live'};
  if(now < start) {
    const n = Math.ceil((start-now)/86400000);
    if(n<=3) return {label:`D-${n}`, cls:'badge-dday-urgent'};
    if(n<=7) return {label:`D-${n}`, cls:'badge-dday-soon'};
    return {label:`D-${n}`, cls:'badge-dday-normal'};
  }
  return {label:'종료', cls:'badge-dday-future'};
}

async function loadEvent() {
  const seq = getParam('seq');
  const card = document.getElementById('detailCard');

  // 0) sessionStorage에서 클릭한 이벤트 데이터 읽기
  const stored = sessionStorage.getItem('wooafest_event');
  if (stored) {
    try {
      evData = JSON.parse(stored);
      sessionStorage.removeItem('wooafest_event');
      renderDetail();
      return;
    } catch(e) {}
  }

  // 1) API 상세 조회 시도
  if (seq) {
    try {
      const apiUrl = `https://apis.data.go.kr/B553457/cultureinfo/detail2?serviceKey=${encodeURIComponent('API_KEY_PLACEHOLDER')}&seq=${seq}&format=json`;
      const res = await fetch(apiUrl);
      if (res.ok) {
        const data = await res.json();
        const item = data?.body?.items?.item?.[0] || data?.response?.body?.items?.item?.[0];
        if (item) {
          evData = normalizeAPIItem(item);
          renderDetail();
          return;
        }
      }
    } catch(e) {}
  }

  // 2) 로컬 JSON에서 검색
  try {
    const [weekRes, festRes, perfRes] = await Promise.all([
      fetch('data/culture/this_week.json').catch(()=>null),
      fetch('data/festival.json').catch(()=>null),
      fetch('data/performance.json').catch(()=>null)
    ]);

    let pool = [];
    if(weekRes?.ok) { const d=await weekRes.json(); pool=[...pool,...(d.items||d||[])]; }
    if(festRes?.ok) {
      const d=await festRes.json();
      const mapped=(d.records||d||[]).map(r=>({
        seq:r['고유번호코드']?String(r['고유번호코드']):'',
        title:r['축제명']||'',place:r['개최장소']||'',
        startDate:(r['축제시작일자']||'').replace(/-/g,''),
        endDate:(r['축제종료일자']||'').replace(/-/g,''),
        content:r['축제내용']||'',lat:r['위도']||'',lng:r['경도']||'',
        tel:r['전화번호']||'',homepage:r['홈페이지']||'',fee:'',realm:'축제'
      }));
      pool=[...pool,...mapped];
    }
    if(perfRes?.ok) {
      const d=await perfRes.json();
      const mapped=(d.records||d||[]).map(r=>({
        title:r['행사명']||'',place:r['행사장소명']||r['개최장소']||'',
        startDate:(r['행사시작일자']||'').replace(/-/g,''),
        endDate:(r['행사종료일자']||'').replace(/-/g,''),
        content:r['행사내용']||'',lat:r['위도좌표']||r['위도']||'',lng:r['경도좌표']||r['경도']||'',
        fee:r['관람요금']||r['행사요금']||'',realm:r['분류']||'행사',
        parking:r['주차시설']||'',age:r['입장연령']||''
      }));
      pool=[...pool,...mapped];
    }

    evData = seq ? pool.find(ev=>ev.seq===seq) || pool[0] : pool[0];
    renderDetail();
  } catch(e) {
    card.innerHTML = '<div class="empty">행사 정보를 불러올 수 없습니다.</div>';
  }
}

function normalizeAPIItem(item) {
  return {
    title: item.title||item.TITLE||'',
    place: item.place||item.PLACE||'',
    startDate: (item.startDate||item.STARTDATE||'').replace(/-/g,''),
    endDate: (item.endDate||item.ENDDATE||'').replace(/-/g,''),
    content: item.contents||item.CONTENTS||'',
    lat: item.lat||item.LAT||'',
    lng: item.lng||item.LNG||'',
    fee: item.price||item.PRICE||'',
    realm: item.realmName||item.REALMNAME||'행사',
    tel: item.phone||item.PHONE||'',
    homepage: item.url||item.URL||'',
    parking: item.parking||'',
    age: item.age||''
  };
}

function renderDetail() {
  if(!evData) return;
  const ev = evData;
  const title = ev.title||ev['행사명']||ev['축제명']||'';
  const place = ev.place||ev['개최장소']||'';
  const start = ev.startDate||ev['시작일자']||ev['축제시작일자']||'';
  const end = ev.endDate||ev['종료일자']||ev['축제종료일자']||'';
  const fee = ev.fee||ev['관람요금']||'';
  const realm = ev.realm||ev['분야']||'행사';
  const content = ev.content||ev['행사내용']||ev['축제내용']||'';
  const lat = ev.lat||ev['위도']||'';
  const lng = ev.lng||ev['경도']||'';
  const tel = ev.tel||ev['전화번호']||'';
  const homepage = ev.homepage||ev['홈페이지주소']||ev['홈페이지']||'';
  const parking = ev.parking||ev['주차시설']||'';
  const age = ev.age||ev['입장연령']||'';
  const address = ev.address||ev['소재지도로명주소']||ev['소재지지번주소']||'';
  const organizer = ev.organizer||ev['주최기관명']||'';
  const host = ev.host||ev['주관기관명']||'';
  const sponsor = ev.sponsor||ev['후원기관명']||'';

  document.title = `${title} | 우아축제`;
  document.getElementById('pageTitle').textContent = `${title} | 우아축제`;
  document.getElementById('pageDesc').content = `${title} - ${place} | ${formatDate(start)}~${formatDate(end)}`;
  document.getElementById('breadRealm').textContent = realm;
  document.getElementById('breadTitle').textContent = title;

  const dday = end ? getDDayLabel(end, start) : null;
  const isFree = !fee || fee==='무료' || fee==='0' || fee==='0원';

  document.getElementById('detailCard').innerHTML = `
    <div class="detail-title">${escHtml(title)}</div>
    <div class="event-card-badges" style="margin-bottom:12px">
      <span class="badge badge-festival">${escHtml(realm)}</span>
      ${isFree ? '<span class="badge badge-free">🆓 무료</span>' : fee ? `<span class="badge badge-paid">💰 유료</span>` : ''}
      ${dday ? `<span class="badge ${dday.cls}">${dday.label}</span>` : ''}
    </div>
    <div class="detail-grid">
      <div class="detail-item"><span class="label">📅 기간</span><span class="value">${formatDate(start)}${end?` ~ ${formatDate(end)}`:''}</span></div>
      <div class="detail-item"><span class="label">📍 장소</span><span class="value">${escHtml(place)}</span></div>
      ${address ? `<div class="detail-item"><span class="label">🗺️ 주소</span><span class="value">${escHtml(address)}</span></div>` : ''}
      ${fee ? `<div class="detail-item"><span class="label">💰 요금</span><span class="value">${escHtml(fee)}</span></div>` : ''}
      ${age ? `<div class="detail-item"><span class="label">👤 입장연령</span><span class="value">${escHtml(age)}</span></div>` : ''}
      ${parking ? `<div class="detail-item"><span class="label">🚗 주차</span><span class="value">${escHtml(parking)}</span></div>` : ''}
      ${organizer ? `<div class="detail-item"><span class="label">🏢 주최</span><span class="value">${escHtml(organizer)}</span></div>` : ''}
      ${host ? `<div class="detail-item"><span class="label">📋 주관</span><span class="value">${escHtml(host)}</span></div>` : ''}
      ${sponsor ? `<div class="detail-item"><span class="label">🤝 후원</span><span class="value">${escHtml(sponsor)}</span></div>` : ''}
      ${tel ? `<div class="detail-item"><span class="label">📞 문의</span><span class="value"><a href="tel:${escHtml(tel)}" style="color:var(--primary)">${escHtml(tel)}</a></span></div>` : ''}
      ${homepage ? `<div class="detail-item"><span class="label">🌐 홈페이지</span><span class="value"><a href="${escHtml(homepage)}" target="_blank" rel="noopener" style="color:var(--primary)">바로가기 →</a></span></div>` : ''}
    </div>`;

  if(content) {
    document.getElementById('contentText').textContent = content;
    document.getElementById('detailContent').style.display = '';
  }

  if(lat && lng) {
    document.getElementById('mapCard').style.display = '';
    loadKakaoMap(lat, lng, title);
  }

  // 생태계 연동
  if(lat && lng) {
    document.getElementById('ecoCard').style.display = '';
    document.getElementById('ecoLinks').innerHTML = `
      <a href="https://wooakids.wooahouse.com" target="_blank" class="ecosystem-card">
        <span class="eco-icon">🧒</span><span class="eco-title">아이랑 관광지</span><span class="eco-link">WooaKids →</span>
      </a>
      <a href="https://wooacamp.wooahouse.com" target="_blank" class="ecosystem-card">
        <span class="eco-icon">🏕️</span><span class="eco-title">근처 캠핑장</span><span class="eco-link">WooaCamp →</span>
      </a>
      <a href="https://wooasijang.wooahouse.com" target="_blank" class="ecosystem-card">
        <span class="eco-icon">🏪</span><span class="eco-title">근처 전통시장</span><span class="eco-link">WooaSijang →</span>
      </a>`;
  }
}

function loadKakaoMap(lat, lng, title) {
  const kakaoKey = document.querySelector('meta[name="kakao-key"]')?.content || '';
  if(!kakaoKey) return;
  const script = document.createElement('script');
  script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoKey}&autoload=false`;
  script.onload = () => {
    kakao.maps.load(() => {
      const container = document.getElementById('map');
      const map = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)), level: 4
      });
      new kakao.maps.Marker({ map, position: new kakao.maps.LatLng(parseFloat(lat), parseFloat(lng)), title });
    });
  };
  document.head.appendChild(script);
}

function openParking() {
  if(!evData) return;
  const lat = evData.lat||evData['위도']||'';
  const lng = evData.lng||evData['경도']||'';
  if(lat && lng) window.open(`https://wooaparking.wooahouse.com/?lat=${lat}&lng=${lng}`, '_blank');
}

(adsbygoogle=window.adsbygoogle||[]).push({});
(adsbygoogle=window.adsbygoogle||[]).push({});
(adsbygoogle=window.adsbygoogle||[]).push({});

document.addEventListener('DOMContentLoaded', loadEvent);
</script>
